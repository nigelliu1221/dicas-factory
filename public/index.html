<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>益成金屬 DICAS — 工廠儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#f5f5f7;--card:#fff;--border:rgba(0,0,0,.06);--bs:rgba(0,0,0,.1);
    --t1:#1d1d1f;--t2:#424245;--t3:#86868b;--t4:#aeaeb2;
    --blue:#0071e3;--blue-bg:rgba(0,113,227,.06);
    --green:#34c759;--green-bg:rgba(52,199,89,.08);
    --orange:#ff9500;--orange-bg:rgba(255,149,0,.08);
    --red:#ff3b30;--red-bg:rgba(255,59,48,.06);
    --purple:#af52de;--purple-bg:rgba(175,82,222,.06);
    --teal:#5ac8fa;--teal-bg:rgba(90,200,250,.08);
    --sh:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.03);
    --r:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t1)}

  .nav{background:#fff;border-bottom:.5px solid var(--bs);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
  .logo{font-size:17px;font-weight:600}
  .logo span{color:var(--t3);font-weight:400}
  .status{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(52,199,89,.3)}50%{box-shadow:0 0 0 5px rgba(52,199,89,0)}}

  .main{padding:20px 32px;max-width:1440px;margin:0 auto}
  .g{display:grid;gap:12px}
  .g5{grid-template-columns:repeat(5,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g21{grid-template-columns:2fr 1fr}
  .mb{margin-bottom:20px}

  .c{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:.5px solid var(--border);overflow:hidden}
  .cp{padding:20px}
  .cs{padding:16px}
  .cl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:6px}

  .kv{font-size:32px;font-weight:700;letter-spacing:-1px}
  .ks{font-size:12px;color:var(--t3);margin-top:4px}

  .al{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:500;margin-bottom:8px}
  .al.w{background:var(--orange-bg);color:#b36800}
  .al.d{background:var(--red-bg);color:var(--red)}
  .al-ico{font-size:15px}
  .al-t{flex:1} .al-t strong{font-weight:600}
  .al-b{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}

  .bc{padding:14px 16px;display:flex;align-items:center;gap:12px}
  .bi{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .bn{font-size:13px;font-weight:600}
  .bsub{font-size:10px;color:var(--t3)}
  .bst{text-align:right}
  .bnum{font-size:18px;font-weight:700;font-family:monospace}

  .ir{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--border);font-size:11px}
  .ir:last-child{border-bottom:0}
  .ir-s{width:16px;text-align:center}
  .ir-n{flex:1;font-weight:500}
  .ir-c{font-size:9px;color:var(--t4);font-family:monospace}
  .ir-bg{width:50px;height:4px;border-radius:2px;background:rgba(0,0,0,.05)}
  .ir-f{height:100%;border-radius:2px}
  .ir-q{width:50px;text-align:right;font-family:monospace;color:var(--t3);font-size:10px}

  .or{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border)}
  .or:last-child{border-bottom:0}
  .oa{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
  .oi{flex:1} .on{font-size:11px;font-weight:600} .od{font-size:9px;color:var(--t3)}
  .ox{text-align:right} .ov{font-size:16px;font-weight:700;font-family:monospace} .ol{font-size:8px;color:var(--t4)}

  .cap-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border)}
  .cap-row:last-child{border-bottom:0}
  .cap-name{flex:1;font-size:11px;font-weight:600}
  .cap-bar-bg{width:80px;height:6px;border-radius:3px;background:rgba(0,0,0,.05)}
  .cap-bar{height:100%;border-radius:3px}
  .cap-pct{width:35px;text-align:right;font-size:10px;font-family:monospace;font-weight:600}

  .issue{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border)}
  .issue:last-child{border-bottom:0}
  .issue-sev{width:6px;height:6px;border-radius:50%;margin-top:5px}
  .issue-txt{flex:1;font-size:11px;color:var(--t2);line-height:1.5}
  .issue-txt strong{color:var(--t1)}
  .tg{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px}

  .cost-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}
  .cost-row.total{border-top:1px solid var(--bs);padding-top:8px;margin-top:4px;font-weight:600}
  .cost-label{color:var(--t3)} .cost-val{font-family:monospace;font-weight:500}

  .chw{height:150px}

  .li{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border)}
  .li:last-child{border-bottom:0}
  .li-d{width:7px;height:7px;border-radius:50%;margin-top:5px}
  .li-c{flex:1;font-size:11px} .li-c strong{color:var(--t1)}
  .li-t{font-size:9px;color:var(--t4)}

  .loading{text-align:center;padding:40px;color:var(--t3)}
  .error{text-align:center;padding:40px;color:var(--red)}
  .retry{background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;margin-top:10px}

  .last-updated{font-size:10px;color:var(--t4);text-align:right;margin-top:8px}

  @media(max-width:1100px){.g5,.g4{grid-template-columns:repeat(2,1fr)}.g3,.g21{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="nav">
  <div class="logo">益成金屬 <span>DICAS</span></div>
  <div class="status"><div class="dot"></div><span id="updateTime">載入中...</span></div>
</div>

<div class="main" id="app">
  <div class="loading">正在從 Notion 載入資料...</div>
</div>

<script>
const API = '';  // Vercel 會自動指向 /api/dashboard
let yieldChart = null;

async function loadDashboard() {
  try {
    const res = await fetch('/api/dashboard');
    if (!res.ok) throw new Error('API Error');
    const data = await res.json();
    render(data);
    document.getElementById('updateTime').textContent = '更新於 ' + new Date().toLocaleTimeString('zh-TW');
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="error">
        載入失敗: ${e.message}<br>
        <button class="retry" onclick="loadDashboard()">重試</button>
      </div>`;
  }
}

function render(data) {
  const { kpi, inventory, outsource, issues, suppliers, brands } = data;
  
  document.getElementById('app').innerHTML = `
<!-- ALERTS -->
${kpi.openIssues > 0 ? `<div class="al d"><span class="al-ico">⚠️</span><div class="al-t"><strong>${kpi.openIssues} 筆異常</strong>待處理</div></div>` : ''}
${inventory.filter(i => i.status === 'danger').length > 0 ? `<div class="al d"><span class="al-ico">🔴</span><div class="al-t"><strong>${inventory.filter(i => i.status === 'danger').length} 項零件</strong>庫存為零</div></div>` : ''}

<!-- KPI -->
<div class="g g5 mb">
  <div class="c cp"><div class="cl">進行中工單</div><div class="kv">${kpi.activeOrders}</div><div class="ks">本月目標 ${kpi.monthlyTarget.toLocaleString()}</div></div>
  <div class="c cp"><div class="cl">整體良率</div><div class="kv" style="color:var(--green)">${kpi.yield}%</div><div class="ks">▲ 正常</div></div>
  <div class="c cp"><div class="cl">外包中</div><div class="kv" style="color:var(--orange)">${kpi.inTransit.toLocaleString()}</div><div class="ks">件</div></div>
  <div class="c cp"><div class="cl">未解決異常</div><div class="kv" style="color:var(--red)">${kpi.openIssues}</div><div class="ks">筆</div></div>
  <div class="c cp"><div class="cl">零件總數</div><div class="kv">${inventory.length}</div><div class="ks">項</div></div>
</div>

<!-- BRANDS -->
<div class="g g4 mb">
  ${brands.map(b => `
  <div class="c bc">
    <div class="bi" style="background:var(--${b.name.includes('粹美')?'orange':b.name.includes('岸頭')?'blue':b.name.includes('風管')?'teal':'purple'}-bg);color:var(--${b.name.includes('粹美')?'orange':b.name.includes('岸頭')?'blue':b.name.includes('風管')?'teal':'purple'})">${b.name.includes('粹美')?'🦶':b.name.includes('岸頭')?'✒️':b.name.includes('風管')?'🔧':'⭐'}</div>
    <div style="flex:1"><div class="bn">${b.name}</div><div class="bsub">${b.contact || '待建立'}</div></div>
    <div class="bst"><div class="bnum" style="color:var(--t4)">0</div><div class="bsub">工單</div></div>
  </div>`).join('')}
</div>

<!-- 3 COLUMNS -->
<div class="g g3 mb">
  <div class="c cs">
    <div class="cl">零件庫存</div>
    ${inventory.slice(0,8).map(i => `
    <div class="ir">
      <div class="ir-s">${i.status==='danger'?'<span style="color:var(--red)">!</span>':i.status==='warning'?'<span style="color:var(--orange)">⏳</span>':'<span style="color:var(--green)">✓</span>'}</div>
      <div class="ir-n">${i.name} <span class="ir-c">${i.number}</span></div>
      <div class="ir-bg"><div class="ir-f" style="width:${i.safety?Math.min(i.stock/i.safety*100,100):100}%;background:var(--${i.status==='danger'?'red':i.status==='warning'?'orange':'green'})"></div></div>
      <div class="ir-q">${i.stock}</div>
    </div>`).join('')}
  </div>

  <div class="c cs">
    <div class="cl">外包追蹤</div>
    ${outsource.length ? outsource.map(o => `
    <div class="or">
      <div class="oa" style="background:var(${o.status==='異常'?'--red-bg':o.status==='加工中'?'--orange-bg':'--blue-bg'});color:var(${o.status==='異常'?'--red':o.status==='加工中'?'--orange':'--blue'})">${o.supplier[0]}</div>
      <div class="oi"><div class="on">${o.supplier} — ${o.part}</div><div class="od">${o.qty} 件</div></div>
      <div class="ox"><div class="ov" style="color:var(${o.status==='異常'?'--red':'--t3'})">${o.status}</div></div>
    </div>`).join('') : '<div style="color:var(--t3);padding:20px">無外包資料</div>'}
  </div>

  <div class="c cs">
    <div class="cl">外包廠負載</div>
    ${suppliers.map(s => `
    <div class="cap-row">
      <div class="cap-name">${s.name}</div>
      <div class="cap-bar-bg"><div class="cap-bar" style="width:${s.load}%;background:var(--${s.load>90?'red':s.load>70?'orange':'green'})"></div></div>
      <div class="cap-pct" style="color:var(--${s.load>90?'red':s.load>70?'orange':'green'})">${s.load}%</div>
    </div>`).join('')}
  </div>
</div>

<!-- ISSUES + COST -->
<div class="g g3 mb">
  <div class="c cs">
    <div class="cl">異常紀錄 <span style="color:var(--red)">${issues.length}</span></div>
    ${issues.length ? issues.slice(0,4).map(i => `
    <div class="issue">
      <div class="issue-sev" style="background:var(--${i.severity==='嚴重'?'red':i.severity==='中等'?'orange':'yellow'})"></div>
      <div class="issue-txt"><strong>#${i.id.slice(0,8)}</strong> ${i.type}<br><span style="color:var(--t3)">${i.description?.slice(0,30)||''}</span></div>
      <div class="tg" style="background:var(--${i.status==='待處理'?'red':i.status==='處理中'?'orange':'green'})-bg;color:var(--${i.status==='待處理'?'red':i.status==='處理中'?'orange':'green'})">${i.status}</div>
    </div>`).join('') : '<div style="color:var(--t3);padding:20px">無異常</div>'}
  </div>

  <div class="c cs">
    <div class="cl">成本範例（踩踩獸）</div>
    <div class="cost-row"><span class="cost-label">原料</span><span class="cost-val">$38</span></div>
    <div class="cost-row"><span class="cost-label">加工</span><span class="cost-val">$52</span></div>
    <div class="cost-row"><span class="cost-label">包材</span><span class="cost-val">$18</span></div>
    <div class="cost-row total"><span class="cost-label">單件成本</span><span class="cost-val">$108</span></div>
    <div class="cost-row" style="margin-top:8px"><span class="cost-label">報價</span><span class="cost-val" style="color:var(--blue)">$168</span></div>
    <div class="cost-row"><span class="cost-label">毛利率</span><span class="cost-val" style="color:var(--green)">35.7%</span></div>
  </div>

  <div class="c cs">
    <div class="cl">良率趨勢</div>
    <div class="chw"><canvas id="yieldChart"></canvas></div>
  </div>
</div>

<div class="last-updated">資料來源：Notion API · 自動更新</div>
`;

  // Yield Chart
  if (yieldChart) yieldChart.destroy();
  yieldChart = new Chart(document.getElementById('yieldChart').getContext('2d'),{
    type:'bar',
    data:{labels:['車銑','噴砂','QC','陽極','組裝','包裝'],datasets:[{label:'實際',data:[98.1,99,97.5,98,99,100],backgroundColor:'rgba(52,199,89,.55)',borderRadius:4},{label:'預期',data:[98,99,97,98,99,100],backgroundColor:'rgba(0,0,0,.05)',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:95,max:101},x:{grid:{display:false}}},plugins:{legend:{labels:{color:'#86868b',font:{size:9}}}}}}
  });
}

// 啟動
loadDashboard();
// 每分鐘更新
setInterval(loadDashboard, 60000);
</script>

</body>
</html>
